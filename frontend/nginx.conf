# CoAgent frontend nginx config (Phase A).
# Browser connects to backend at localhost:3001 directly — no proxying here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path returns index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets for a year; index.html stays no-cache so deploys flip cleanly.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
