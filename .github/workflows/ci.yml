name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Type-check ────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check backend
        run: npm run typecheck -w backend

      - name: Type-check frontend
        run: npm run typecheck -w frontend

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  # ── Stage 3: Unit & Security Tests ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # jq is pre-installed on ubuntu-latest but we pin it explicitly
      # because shellInjection.test.ts calls jq as a subprocess
      - name: Ensure jq is available
        run: jq --version

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test -w backend

      - name: Run frontend tests
        run: npm run test -w frontend

  # ── Stage 4: AI Security Tests (guardrail regression battery) ─────────────
  security-test:
    name: AI Security Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run only the security-critical test suites as a named gate.
      # This makes prompt-injection and shell-injection regressions
      # visible as a separate CI check from general unit tests.
      - name: Guardrail — prompt injection regression
        run: npm run test -w backend -- --reporter=verbose src/__tests__/guardrail.test.ts

      - name: Guardrail — shell injection regression
        run: npm run test -w backend -- --reporter=verbose src/__tests__/shellInjection.test.ts

  # ── Stage 5: Dependency Audit ──────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fail on critical vulnerabilities only.
      # High/moderate are reported but do not block the pipeline.
      - name: Audit for critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Full audit report (informational)
        run: npm audit --audit-level=high || true
