name: Release

# Trigger: push a tag like v0.3.2
# Workflow:
#   1. Validate the tag matches the VERSION file (prevents accidental mismatches)
#   2. Run the full CI pipeline (build + test) on the tagged commit
#   3. Extract the matching section from CHANGELOG.md as release notes
#   4. Create a GitHub Release with those notes

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag vs VERSION
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION file
        id: ver
        run: echo "value=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Assert tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.3.2
          VERSION="v${{ steps.ver.outputs.value }}"   # e.g. v0.3.2
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag ($TAG) does not match VERSION file ($VERSION)."
            echo "::error::Update the VERSION file before tagging."
            exit 1
          fi

  ci:
    name: Full CI on tagged commit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check backend
        run: npm run typecheck -w backend

      - name: Type-check frontend
        run: npm run typecheck -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      - name: Run all tests
        run: |
          npm run test -w backend
          npm run test -w frontend

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, ci]
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this version
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract lines between the heading that contains this version
          # and the next '## ' heading (or end of file)
          NOTES=$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver) > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi

          # Write to a temp file to avoid quoting issues in GITHUB_OUTPUT
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "CoAgent v${{ needs.validate.outputs.version }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
